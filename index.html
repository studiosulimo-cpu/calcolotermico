<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Energy Tool Pro</title>
<script src="app.js" defer></script>

<style>
body { font-family: Arial; margin: 30px; background:#f4f6f8;}
.box { background:white; padding:20px; margin-bottom:20px; border-radius:8px;}
input, select { padding:6px; margin:5px;}
button { padding:10px 20px; font-size:16px;}
.best { background:#d4edda; padding:10px; margin-bottom:10px;}
</style>
</head>

<body>

<h2>⚡ Energy Tool – Analisi Multi Scenario</h2>

<div class="box">
<h3>Dati edificio</h3>

Superficie (m²)<br>
<input id="sup"><br>

Consumo gas (kWh)<br>
<input id="gas"><br>

Consumo elettrico (kWh)<br>
<input id="ele"><br>

Costo gas €/kWh<br>
<input id="cgas" value="0.10"><br>

Costo elettrico €/kWh<br>
<input id="cele" value="0.25"><br>

Zona climatica<br>
<select id="zona">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
</select>

</div>

<div class="box">
<h3>Impianti</h3>

Potenza (kW)<br>
<input id="potenza"><br>

COP PDC<br>
<input id="cop" value="3.5"><br>

Ore annue<br>
<input id="ore" value="1200"><br>

</div>

<button onclick="calcola()">Simula scenari</button>

<div class="box">
<h3>Risultati</h3>
<div id="out"></div>
</div>

</body>
</html>
